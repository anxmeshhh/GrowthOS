version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: growthos_db
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-growthos}
      MYSQL_USER: ${MYSQL_USER:-growthos_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - growthos_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: growthos_backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2
    ports:
      - "127.0.0.1:8005:8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=growth-os.tech,www.growth-os.tech,api.growth-os.tech
      - MYSQL_DATABASE=${MYSQL_DATABASE:-growthos}
      - MYSQL_USER=${MYSQL_USER:-growthos_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - FERNET_KEY=${FERNET_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    depends_on:
      - db
    networks:
      - growthos_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_BASE_URL=https://api.growth-os.tech/api
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
        - VITE_GITHUB_CLIENT_ID=${VITE_GITHUB_CLIENT_ID}
    container_name: growthos_frontend
    ports:
      - "127.0.0.1:3005:80"
    networks:
      - growthos_network
    restart: unless-stopped

networks:
  growthos_network:
    driver: bridge

volumes:
  mysql_data:
  static_volume:
  media_volume:
