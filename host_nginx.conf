# GrowthOS Host Web Server Configuration
# Place this file in /etc/nginx/sites-available/growthos
# Then run: sudo ln -s /etc/nginx/sites-available/growthos /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name growth-os.tech www.growth-os.tech;

    # Allow Google/GitHub OAuth popups to communicate back to the parent window
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Cross-Origin-Embedder-Policy "unsafe-none" always;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prevent favicon 404 noise in logs
    location = /favicon.ico {
        proxy_pass http://127.0.0.1:3005/favicon.ico;
        log_not_found off;
        access_log off;
    }
}

server {
    listen 80;
    server_name api.growth-os.tech;

    location / {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
