# GrowthOS Host Web Server Configuration
# Place this file in /etc/nginx/sites-available/growthos
# Then run: sudo ln -s /etc/nginx/sites-available/growthos /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name growth-os.tech www.growth-os.tech api.growth-os.tech;

    # Certbot challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name growth-os.tech www.growth-os.tech;

    # SSL Certificates (Managed by Host Certbot)
    # certbot --nginx -d growth-os.tech -d www.growth-os.tech -d api.growth-os.tech
    ssl_certificate /etc/letsencrypt/live/growth-os.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/growth-os.tech/privkey.pem;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Proxy to Docker Frontend Container
    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name api.growth-os.tech;

    # SSL Certificates (Managed by Host Certbot)
    ssl_certificate /etc/letsencrypt/live/growth-os.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/growth-os.tech/privkey.pem;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Proxy to Docker Backend Container
    location / {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
